{% if counts.error is defined %}
  <div class="alert alert-warning py-2 mb-0">{{ counts.error }}</div>
{% else %}
  <div class="d-flex flex-wrap gap-2">
    {% for name, count in counts.items() %}
      <span class="badge fs-6
        {% if name == 'Events' %}bg-success
        {% elif name == 'NotEvents' %}bg-secondary
        {% else %}bg-primary{% endif %}">
        {{ name }}: {{ count }}
      </span>
    {% endfor %}
    <span class="badge bg-dark fs-6">
      Total: {{ counts.values() | sum }}
    </span>
  </div>
{% endif %}
